<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم بالأسعار - صرح الغذاء</title>
    <!-- Tailwind CSS لتصميم لوحة تحكم عصرية ونظيفة -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap');
        body { font-family: 'Tajawal', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">

    <!-- الهيدر العلوي للوحة التحكم -->
    <header class="bg-slate-900 text-white shadow-md sticky top-0 z-50">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-xl font-bold flex items-center gap-2 text-green-400">
                ⚙️ لوحة إدارة أسعار المنتجات المحدثة
            </h1>
            <a href="index.html" class="bg-slate-800 hover:bg-slate-700 text-sm font-medium px-4 py-2 rounded-xl transition border border-slate-700">
                👁️ عرض المتجر الرئيسي
            </a>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8">
        
        <!-- بار البحث والتحكم السريع -->
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 mb-8 flex flex-col md:flex-row gap-4 items-center justify-between">
            <div class="w-full md:w-1/2">
                <label class="block text-xs font-bold text-slate-500 mb-2">البحث السريع عن منتج لتغيير سعره:</label>
                <input type="text" id="search-input" oninput="searchProducts()" placeholder="اكتب اسم المنتج هنا... (مثال: بيبسي، تونا، حليب)" class="w-full border border-slate-200 rounded-xl p-3 text-sm focus:outline-none focus:ring-2 focus:ring-green-500">
            </div>
            
            <div class="flex gap-3 w-full md:w-auto justify-end">
                <button onclick="resetAllPrices()" class="bg-red-50 text-red-600 hover:bg-red-500 hover:text-white px-5 py-3 rounded-xl text-xs font-bold transition cursor-pointer">
                    ↩️ إعادة كافة الأسعار الافتراضية
                </button>
            </div>
        </div>

        <!-- جدول المنتجات الـ 200 المطور -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
            <div class="p-5 border-b border-slate-100 bg-slate-50 flex justify-between items-center">
                <h3 class="font-bold text-slate-700 text-sm">قائمة التحكم بالسلع والأسعار الحاليّة</h3>
                <span class="text-xs text-slate-400">عدد المنتجات الظاهرة: <span id="visible-count" class="text-green-600 font-bold">200</span></span>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-right border-collapse">
                    <thead>
                        <tr class="bg-slate-100 text-slate-600 text-xs font-bold border-b border-slate-200">
                            <th class="p-4 w-16">رقم</th>
                            <th class="p-4 w-20">الصورة</th>
                            <th class="p-4">اسم المنتج الحقيقي</th>
                            <th class="p-4">القسم والنوع</th>
                            <th class="p-4 w-44">السعر الحالي (ر.س)</th>
                            <th class="p-4 w-32">حفظ التعديل</th>
                        </tr>
                    </thead>
                    <tbody id="admin-table-body" class="divide-y divide-slate-100 text-sm text-slate-700">
                        <!-- جافاسكريبت يقوم بتوليد الـ 200 سطر هنا -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const categories = [
            "الألبان والأجبان والبيض", "المعلبات والأغذية المحفوظة", "المشروبات والعصائر", 
            "المخبوزات والحلويات", "الزيوت والبهارات والمواد الأساسية", "المنظفات والعناية الشخصية"
        ];

        // نفس مصفوفة الصور والبيانات الدقيقة الموجودة في المتجر ليكون التوافق تاماً
        const realProductsPool = {
            "الألبان والأجبان والبيض": [
                { name: "حليب المراعي كامل الدسم 1 لتر", img: "https://images.unsplash.com/photo-1550583724-b2692b85b150?w=400" },
                { name: "حليب نادك قليل الدسم 1 لتر", img: "https://images.unsplash.com/photo-1563636619-e9143da7973b?w=400" },
                { name: "لبن المراعي طازج 2 لتر", img: "https://images.unsplash.com/photo-1628088062854-d1870b4553da?w=400" },
                { name: "زبادي نادك طازج 170 غرام", img: "https://images.unsplash.com/photo-1488477181946-6428a0291777?w=400" },
                { name: "قشطة التاج 155 غرام", img: "https://images.unsplash.com/photo-1588195538326-c5b1e9f80a1b?w=400" },
                { name: "جبنة كرافت شيدر علب 100 غرام", img: "https://images.unsplash.com/photo-1589881133595-a3c085cb1493?w=400" },
                { name: "جبنة بوك كاسات 500 غرام", img: "https://images.unsplash.com/photo-1552763442-159ac9a24dce?w=400" },
                { name: "لبنة بينار تركية 400 غرام", img: "https://images.unsplash.com/photo-1610393742133-114d2e1d816f?w=400" },
                { name: "جبنة فيتا المراعي 200 غرام", img: "https://images.unsplash.com/photo-1608686207856-001b95cf60ca?w=400" },
                { name: "بيض دجاج محلي طبق 30 حبة", img: "https://images.unsplash.com/photo-1516448620398-c5f44bf9f441?w=400" },
                { name: "زبدة لورباك غير مملحة 100 غرام", img: "https://images.unsplash.com/photo-1589985270826-4b7bb135bc9d?w=400" }
            ],
            "المعلبات والأغذية المحفوظة": [
                { name: "تونا قودي تندرينا 80 غرام", img: "https://images.unsplash.com/photo-1534422298391-e4f8c172dddb?w=400" },
                { name: "فول مدمس حدائق كاليفورنيا", img: "https://images.unsplash.com/photo-1544816155-12df9643f363?w=400" },
                { name: "فاصوليا حمراء العلالي", img: "https://images.unsplash.com/photo-1546833999-b9f581a1996d?w=400" },
                { name: "حمص حب أطلس علب", img: "https://images.unsplash.com/photo-1536147116438-62679a5e01f2?w=400" },
                { name: "ذرة حلوة قودي كاملة الحب", img: "https://images.unsplash.com/photo-1551782450-a2132b4ba21d?w=400" },
                { name: "صلصة طماطم السعودية 135 غرام", img: "https://images.unsplash.com/photo-1607305387299-a3d9611cd46f?w=400" }
            ],
            "المشروبات والعصائر": [
                { name: "بيبسي علبة 325 مل", img: "https://images.unsplash.com/photo-1622483767028-3f66f32aef97?w=400" },
                { name: "سفن أب علبة 325 مل", img: "https://images.unsplash.com/photo-1543257580-7269da773bf5?w=400" },
                { name: "كوكا كولا كين 325 مل", img: "https://images.unsplash.com/photo-1554866585-cd94860890b7?w=400" },
                { name: "مياه معدنية نوفا 24×330 مل", img: "https://images.unsplash.com/photo-1608885898957-a599fb15d841?w=400" },
                { name: "عصير برتقال ربيع 1 لتر", img: "https://images.unsplash.com/photo-1613478223719-2ab802602423?w=400" },
                { name: "مشروب فيمتو مركز 710 مل", img: "https://images.unsplash.com/photo-1513558161293-cdaf765ed2fd?w=400" },
                { name: "آيس تي ليبتون خوخ 320 مل", img: "https://images.unsplash.com/photo-1556679343-c7306c1976bc?w=400" }
            ],
            "المخبوزات والحلويات": [
                { name: "خبز توست أبيض لوزين", img: "https://images.unsplash.com/photo-1509440159596-0249088772ff?w=400" },
                { name: "خبز صامولي لوزين 6 حبات", img: "https://images.unsplash.com/photo-1549931319-a545dcf3bc73?w=400" },
                { name: "بطاطس ليز بالملح كبير", img: "https://images.unsplash.com/photo-1566478431344-19515568bc1b?w=400" }
            ],
            "الزيوت والبهارات والمواد الأساسية": [
                { name: "أرز بسمتي الشعلان 5 كغم", img: "https://images.unsplash.com/photo-1586201375761-83865001e31c?w=400" },
                { name: "زيت طبخ عافي ذرة 1.5 لتر", img: "https://images.unsplash.com/photo-1474979266404-7eaacbcd87c5?w=400" }
            ],
            "المنظفات والعناية الشخصية": [
                { name: "صابون صحون فيري بالليمون 1 لتر", img: "https://images.unsplash.com/photo-1607006342456-ba274cb2269f?w=400" },
                { name: "مناديل فاين ناعمة 10×80 منديل", img: "https://images.unsplash.com/photo-1584622650111-993a426fbf0a?w=400" }
            ]
        };

        let products = [];
        let customPrices = JSON.parse(localStorage.getItem('grocery_prices')) || {};

        // بناء الـ 200 منتج بشكل متطابق مع المتجر الرئيسي
        let idCounter = 1;
        while (products.length < 200) {
            for (let cat of categories) {
                if (products.length >= 200) break;
                
                let pool = realProductsPool[cat] || [{ name: "منتج عام", img: "" }];
                let poolIndex = (idCounter - 1) % pool.length;
                let currentItem = pool[poolIndex];
                
                let iteration = Math.floor((idCounter - 1) / pool.length);
                let suffix = iteration > 0 ? ` (عبوة إضافية ${iteration + 1})` : "";
                
                let itemId = idCounter;
                let defaultPrice = ((idCounter % 15) + 5.50);
                let finalPrice = customPrices[itemId] ? customPrices[itemId] : defaultPrice;

                products.push({
                    id: itemId,
                    name: `${currentItem.name}${suffix}`,
                    category: cat,
                    price: parseFloat(finalPrice),
                    image: currentItem.img
                });
                idCounter++;
            }
        }

        function renderTable(items) {
            const tbody = document.getElementById('admin-table-body');
            tbody.innerHTML = '';
            document.getElementById('visible-count').innerText = items.length;

            items.forEach(product => {
                tbody.innerHTML += `
                    <tr class="hover:bg-slate-50 transition">
                        <td class="p-4 text-slate-400 font-medium">${product.id}</td>
                        <td class="p-4">
                            <img src="${product.image}" alt="" class="w-10 h-10 object-cover rounded-lg bg-slate-100 border border-slate-200">
                        </td>
                        <td class="p-4 font-bold text-slate-800">${product.name}</td>
                        <td class="p-4"><span class="text-xs font-medium text-slate-500 bg-slate-100 px-2 py-1 rounded">${product.category}</span></td>
                        <td class="p-4">
                            <div class="flex items-center gap-1.5">
                                <input type="number" id="price-input-${product.id}" step="0.01" value="${product.price.toFixed(2)}" class="w-24 border border-slate-200 rounded-lg p-1.5 text-center font-bold text-green-600 focus:outline-none focus:ring-2 focus:ring-green-500">
                                <span class="text-xs text-slate-400">ر.س</span>
                            </div>
                        </td>
                        <td class="p-4">
                            <button onclick="savePrice(${product.id})" class="bg-green-500 hover:bg-green-600 text-white text-xs font-bold px-3 py-2 rounded-lg transition cursor-pointer">
                                حفظ 💾
                            </button>
                        </td>
                    </tr>
                `;
            });
        }

        function searchProducts() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const filtered = products.filter(p => p.name.toLowerCase().includes(query) || p.category.toLowerCase().includes(query));
            renderTable(filtered);
        }

        function savePrice(id) {
            const inputVal = document.getElementById(`price-input-${id}`).value;
            const newPrice = parseFloat(inputVal);

            if (isNaN(newPrice) || newPrice < 0) {
                alert("الرجاء إدخال سعر صحيح وموجب.");
                return;
            }

            // تحديث في الذاكرة المحلية لتأخذه صفحة المتجر فوراً
            customPrices[id] = newPrice;
            localStorage.setItem('grocery_prices', JSON.stringify(customPrices));

            // تحديث الكائن في الصفحة الحالية
            const prod = products.find(p => p.id === id);
            if (prod) prod.price = newPrice;

            alert(`✅ تم تحديث سعر "${prod.name}" بنجاح إلى ${newPrice.toFixed(2)} ر.س`);
        }

        function resetAllPrices() {
            if (confirm("هل أنت متأكد من رغبتك في حذف كل الأسعار المعدلة والعودة للأسعار الافتراضية؟")) {
                localStorage.removeItem('grocery_prices');
                location.reload();
            }
        }

        // تشغيل الجدول عند تحميل الصفحة لأول مرة
        renderTable(products);
    </script>
</body>
</html>
