<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سستّم إدارة أسعار البقالة</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap');
        body { font-family: 'Tajawal', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">

    <header class="bg-white shadow-sm sticky top-0 z-50 border-b border-gray-200">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-xl font-bold text-red-600 flex items-center gap-2">
                ⚙️ لوحة السستّم والتسعير الذكي (200 منتج)
            </h1>
            <a href="index.html" class="bg-green-500 hover:bg-green-600 text-white font-bold px-4 py-2 rounded-xl text-xs transition">
                الذهاب للمتجر وعرض الأسعار 🛒
            </a>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8 max-w-4xl">
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200">
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6">
                <div>
                    <h2 class="text-lg font-bold text-gray-900">سستّم تغيير الأسعار الفوري</h2>
                    <p class="text-xs text-gray-400 mt-1">عدل سعر أي منتج حقيقي بالأسفل واضغط حفظ ليتم تحديث السعر تلقائياً في صفحة الزبون.</p>
                </div>
            </div>

            <!-- جدول الـ 200 منتج كاملاً -->
            <div class="overflow-x-auto max-h-[70vh] border border-gray-100 rounded-xl">
                <table class="w-full text-right border-collapse">
                    <thead>
                        <tr class="bg-gray-50 border-b border-gray-200 text-xs text-gray-500 sticky top-0">
                            <th class="p-3">ID المنتج</th>
                            <th class="p-3">اسم السلعة الحقيقي</th>
                            <th class="p-3">القسم</th>
                            <th class="p-3 w-36">السعر الجديد (ر.س)</th>
                            <th class="p-3 text-center">الإجراء</th>
                        </tr>
                    </thead>
                    <tbody id="admin-table-body" class="text-xs divide-y divide-gray-100 bg-white">
                        <!-- الـ 200 سلعة يتم صفها هنا -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const categories = [
            "الألبان والأجبان والبيض", "المعلبات والأغذية المحفوظة", "المشروبات والعصائر", 
            "المخبوزات والحلويات", "الزيوت والبهارات والمواد الأساسية", "المنظفات والعناية الشخصية"
        ];

        const realProductsPool = {
            "الألبان والأجبان والبيض": [
                "حليب المراعي كامل الدسم 1 لتر", "حليب نادك قليل الدسم 1 لتر", "لبن المراعي طازج 2 لتر", 
                "زبادي نادك طازج 170 غرام", "قشطة التاج 155 غرام", "جبنة كرافت شيدر علب 100 غرام",
                "جبنة بوك كاسات 500 غرام", "لبنة بينار تركية 400 غرام", "جبنة فيتا المراعي 200 غرام", 
                "بيض دجاج محلي طبق 30 حبة", "زبدة لورباك غير مملحة 100 غرام", "كريمة الطبخ المراعي 500 مل",
                "حليب مكثف محلى نستله 397 غرام", "جبنة موزاريلا مبشورة المراعي 200 غرام", "زبادي يوناني ندى سادة"
            ],
            "المعلبات والأغذية المحفوظة": [
                "تونا قودي تندرينا 80 غرام", "فول مدمس حدائق كاليفورنيا", "فاصوليا حمراء العلالي", 
                "حمص حب أطلس علب", "ذرة حلوة قودي كاملة الحب", "صلصة طماطم السعودية 135 غرام",
                "كاتشب طماطم ليبنز 340 غرام", "مايونيز قودي أصلي 250 مل", "شطة حارة رنا صغيرة",
                "ورق عنب قودي 450 غرام", "مربى الفراولة حلواني 400 غرام", "عسل طبيعي الشفاء 250 غرام"
            ],
            "المشروبات والعصائر": [
                "مياه معدنية نوفا 24×330 مل", "بيبسي علبة 325 مل", "سفن أب علبة 325 مل", 
                "كوكا كولا كين 325 مل", "عصير برتقال ربيع 1 لتر", "عصير تفاح المراعي 200 مل",
                "شاي ربيع إكسبريس 100 كيس", "شاي ليبتون فرط 200 غرام", "قهوة نسكافيه ريد كاب 100 غرام",
                "مشروب فيمتو مركز 710 مل", "آيس تي ليبتون خوخ 320 مل", "مياه غازية بيرين 330 مل"
            ],
            "المخبوزات والحلويات": [
                "خبز توست أبيض لوزين", "خبز صامولي لوزين 6 حبات", "كرواسون لوزين شوكولاتة", 
                "خبز برجر هرفي بالسمسم", "بسكويت شاي ميموريز", "بسكويت ديمة بالتمر",
                "كيك بار لوزين فانيلا", "بطاطس ليز بالملح كبير", "شيبس برينجلز أصلي",
                "شوكولاتة جلاكسي ناعمة", "بسكويت أوريو أصلي", "ويفر لواكر بكريم الكاكاو"
            ],
            "الزيوت والبهارات والمواد الأساسية": [
                "أرز بسمتي الشعلان 5 كغم", "زيت طبخ عافي ذرة 1.5 لتر", "زيت زيتون الوزير 500 مل",
                "سكر الأسرة ناعم 2 كغم", "ملح طعام ساسا يودي", "مكرونة قودي خواتم 450 غرام",
                "شعيرية إندومي دجاج بالثوم", "دقيق كويتي فاخر 1 كغم", "شوفان كويكر علب 500 غرام",
                "مرقة دجاج ماجي 24 مكعب", "خل أبيض رنا 473 مل", "نشا ذرة العلالي 100 غرام"
            ],
            "المنظفات والعناية الشخصية": [
                "صابون صحون فيري بالليمون 1 لتر", "مناديل فاين ناعمة 10×80 منديل", "شامبو بانتين بديل الزيت",
                "صابون ديتول مستر 115 غرام", "معجون أسنان كولجيت أصلي", "سائل غسيل ملابس تايد 2.5 لتر",
                "مسترق للجو جليد لافندر", "مبيّض ملابس كلوركس أصلي", "منظف أرضيات داك ورد 3 لتر",
                "شامبو عباءة برسيل 1 لتر", "صابون يدين لايفبوي 200 مل", "شفرات حلاقة جيليت بلو 2"
            ]
        };

        let customPrices = JSON.parse(localStorage.getItem('grocery_prices')) || {};

        function loadAdminPanel() {
            const tbody = document.getElementById('admin-table-body');
            tbody.innerHTML = '';

            let idCounter = 1;
            let loadedCount = 0;

            while (loadedCount < 200) {
                for (let cat of categories) {
                    if (loadedCount >= 200) break;
                    
                    let pool = realProductsPool[cat];
                    let poolIndex = (idCounter - 1) % pool.length;
                    let baseName = pool[poolIndex];
                    
                    let iteration = Math.floor((idCounter - 1) / pool.length);
                    let suffix = iteration > 0 ? ` (حجم عائلي أو عبوة إضافية ${iteration})` : "";
                    
                    let itemId = idCounter;
                    let defaultPrice = ((idCounter % 18) + 4.75);
                    let currentPrice = customPrices[itemId] ? customPrices[itemId] : defaultPrice;

                    tbody.innerHTML += `
                        <tr class="hover:bg-gray-50/50">
                            <td class="p-3 font-mono text-gray-400 font-bold">#${itemId}</td>
                            <td class="p-3 font-bold text-gray-700">${baseName}${suffix}</td>
                            <td class="p-3"><span class="text-[10px] bg-gray-100 text-gray-600 px-2 py-0.5 rounded font-medium">${cat}</span></td>
                            <td class="p-3">
                                <div class="flex items-center gap-1">
                                    <input type="number" id="price-input-${itemId}" value="${parseFloat(currentPrice).toFixed(2)}" step="0.01" min="0.5" 
                                        class="w-full border border-gray-200 rounded-lg p-1.5 text-center font-bold text-green-600 focus:outline-none focus:ring-2 focus:ring-green-400 bg-gray-50">
                                    <span class="text-xs text-gray-400">ر.س</span>
                                </div>
                            </td>
                            <td class="p-3 text-center">
                                <button onclick="savePrice(${itemId})" class="bg-green-500 hover:bg-green-600 text-white font-bold text-xs px-3 py-2 rounded-xl transition cursor-pointer shadow-sm shadow-green-50">
                                    حفظ وتحديث 💾
                                </button>
                            </td>
                        </tr>
                    `;
                    idCounter++;
                    loadedCount++;
                }
            }
        }

        function savePrice(id) {
            const inputVal = document.getElementById(`price-input-${id}`).value;
            if(!inputVal || inputVal <= 0) {
                alert("يرجى كتابة سعر صحيح أكبر من الصفر!");
                return;
            }

            customPrices[id] = parseFloat(inputVal).toFixed(2);
            localStorage.setItem('grocery_prices', JSON.stringify(customPrices));
            
            alert(`✅ سستّم: تم تحديث السعر بنجاح للمنتج رقم #${id} إلى ${inputVal} ر.س.`);
        }

        // تشغيل فوري للوحة عند الفتح
        loadAdminPanel();
    </script>
</body>
</html>
