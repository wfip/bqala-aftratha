<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم والطلبات - صرح الغذاء</title>
    <!-- Tailwind CSS لتصميم لوحة تحكم عصرية ونظيفة -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap');
        body { font-family: 'Tajawal', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">

    <!-- الهيدر العلوي للوحة التحكم -->
    <header class="bg-slate-900 text-white shadow-md sticky top-0 z-50">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-xl font-bold flex items-center gap-2 text-green-400">
                ⚙️ لوحة إدارة الأسعار والطلبات الواردة
            </h1>
            <a href="index.html" class="bg-slate-800 hover:bg-slate-700 text-sm font-medium px-4 py-2 rounded-xl transition border border-slate-700">
                👁️ عرض المتجر الرئيسي
            </a>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8 space-y-8">
        
        <!-- ================= قـسـم الـطـلـبـات الـواردة ================= -->
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
            <div class="flex justify-between items-center mb-4">
                <div>
                    <h2 class="text-lg font-bold text-slate-900 flex items-center gap-2">
                        📥 طلبات الشراء الواردة من المتجر
                    </h2>
                    <p class="text-xs text-slate-400 mt-0.5">تظهر هنا الطلبات التي يرسلها الزبائن من صفحة السلة مباشرة</p>
                </div>
                <button onclick="clearAllOrders()" class="text-xs text-red-500 hover:underline font-medium cursor-pointer">حذف جميع الطلبات</button>
            </div>
            
            <!-- جدول أو قائمة عرض الطلبات -->
            <div id="orders-container" class="space-y-4 max-h-[400px] overflow-y-auto pr-1">
                <p class="text-slate-400 text-sm text-center py-8 bg-slate-50 rounded-xl border border-dashed border-slate-200">لا توجد طلبات واردة حالياً</p>
            </div>
        </div>

        <!-- بار البحث والتحكم السريع بالأسعار -->
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex flex-col md:flex-row gap-4 items-center justify-between">
            <div class="w-full md:w-1/2">
                <label class="block text-xs font-bold text-slate-500 mb-2">البحث السريع عن منتج لتعديل سعره:</label>
                <input type="text" id="search-input" oninput="searchProducts()" placeholder="اكتب اسم المنتج هنا... (مثال: بيبسي، تونا، حليب)" class="w-full border border-slate-200 rounded-xl p-3 text-sm focus:outline-none focus:ring-2 focus:ring-green-500">
            </div>
            
            <div class="flex gap-3 w-full md:w-auto justify-end">
                <button onclick="resetAllPrices()" class="bg-red-50 text-red-600 hover:bg-red-500 hover:text-white px-5 py-3 rounded-xl text-xs font-bold transition cursor-pointer">
                    ↩️ إعادة الأسعار الافتراضية للكل
                </button>
            </div>
        </div>

        <!-- جدول المنتجات الـ 200 (بدون صور) -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
            <div class="p-5 border-b border-slate-100 bg-slate-50 flex justify-between items-center">
                <h3 class="font-bold text-slate-700 text-sm">تعديل أسعار قائمة السلع</h3>
                <span class="text-xs text-slate-400">عدد السلع: <span id="visible-count" class="text-green-600 font-bold">200</span></span>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-right border-collapse">
                    <thead>
                        <tr class="bg-slate-100 text-slate-600 text-xs font-bold border-b border-slate-200">
                            <th class="p-4 w-16">رقم</th>
                            <th class="p-4">اسم المنتج الحقيقي</th>
                            <th class="p-4">القسم والنوع</th>
                            <th class="p-4 w-44">السعر الحالي (ر.س)</th>
                            <th class="p-4 w-32">حفظ التعديل</th>
                        </tr>
                    </thead>
                    <tbody id="admin-table-body" class="divide-y divide-slate-100 text-sm text-slate-700">
                        <!-- جافاسكريبت يقوم بتوليد الـ 200 سطر هنا -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const categories = [
            "الألبان والأجبان والبيض", "المعلبات والأغذية المحفوظة", "المشروبات والعصائر", 
            "المخبوزات والحلويات", "الزيوت والبهارات والمواد الأساسية", "المنظفات والعناية الشخصية"
        ];

        const realProductsPool = {
            "الألبان والأجبان والبيض": [
                { name: "حليب المراعي كامل الدسم 1 لتر" }, { name: "حليب نادك قليل الدسم 1 لتر" },
                { name: "لبن المراعي طازج 2 لتر" }, { name: "زبادي نادك طازج 170 غرام" },
                { name: "قشطة التاج 155 غرام" }, { name: "جبنة كرافت شيدر علب 100 غرام" },
                { name: "جبنة بوك كاسات 500 غرام" }, { name: "لبنة بينار تركية 400 غرام" },
                { name: "جبنة فيتا المراعي 200 غرام" }, { name: "بيض دجاج محلي طبق 30 حبة" }
            ],
            "المعلبات والأغذية المحفوظة": [
                { name: "تونا قودي تندرينا 80 غرام" }, { name: "فول مدمس حدائق كاليفورنيا" },
                { name: "فاصوليا حمراء العلالي" }, { name: "حمص حب أطلس علب" },
                { name: "ذرة حلوة قودي كاملة الحب" }, { name: "صلصة طماطم السعودية 135 غرام" }
            ],
            "المشروبات والعصائر": [
                { name: "بيبسي علبة 325 مل" }, { name: "سفن أب علبة 325 مل" },
                { name: "كوكا كولا كين 325 مل" }, { name: "مياه معدنية نوفا 24×330 مل" },
                { name: "عصير برتقال ربيع 1 لتر" }, { name: "مشروب فيمتو مركز 710 مل" },
                { name: "آيس تي ليبتون خوخ 320 مل" }
            ],
            "المخبوزات والحلويات": [
                { name: "خبز توست أبيض لوزين" }, { name: "خبز صامولي لوزين 6 حبات" },
                { name: "بطاطس ليز بالملح كبير" }
            ],
            "الزيوت والبهارات والمواد الأساسية": [
                { name: "أرز بسمتي الشعلان 5 كغم" }, { name: "زيت طبخ عافي ذرة 1.5 لتر" }
            ],
            "المنظفات والعناية الشخصية": [
                { name: "صابون صحون فيري بالليمون 1 لتر" }, { name: "مناديل فاين ناعمة 10×80 منديل" }
            ]
        };

        let products = [];
        let customPrices = JSON.parse(localStorage.getItem('grocery_prices')) || {};

        // بناء قائمة الـ 200 منتج الحقيقية
        let idCounter = 1;
        while (products.length < 200) {
            for (let cat of categories) {
                if (products.length >= 200) break;
                
                let pool = realProductsPool[cat] || [{ name: "منتج عام" }];
                let poolIndex = (idCounter - 1) % pool.length;
                let currentItem = pool[poolIndex];
                
                let iteration = Math.floor((idCounter - 1) / pool.length);
                let suffix = iteration > 0 ? ` (عبوة إضافية ${iteration + 1})` : "";
                
                let itemId = idCounter;
                let defaultPrice = ((idCounter % 15) + 5.50);
                let finalPrice = customPrices[itemId] ? customPrices[itemId] : defaultPrice;

                products.push({
                    id: itemId,
                    name: `${currentItem.name}${suffix}`,
                    category: cat,
                    price: parseFloat(finalPrice)
                });
                idCounter++;
            }
        }

        // دالة عرض جدول التحكم بالأسعار (بدون عمود الصور)
        function renderTable(items) {
            const tbody = document.getElementById('admin-table-body');
            tbody.innerHTML = '';
            document.getElementById('visible-count').innerText = items.length;

            items.forEach(product => {
                tbody.innerHTML += `
                    <tr class="hover:bg-slate-50 transition">
                        <td class="p-4 text-slate-400 font-medium">${product.id}</td>
                        <td class="p-4 font-bold text-slate-800">${product.name}</td>
                        <td class="p-4"><span class="text-xs font-medium text-slate-500 bg-slate-100 px-2 py-1 rounded">${product.category}</span></td>
                        <td class="p-4">
                            <div class="flex items-center gap-1.5">
                                <input type="number" id="price-input-${product.id}" step="0.01" value="${product.price.toFixed(2)}" class="w-24 border border-slate-200 rounded-lg p-1.5 text-center font-bold text-green-600 focus:outline-none focus:ring-2 focus:ring-green-500">
                                <span class="text-xs text-slate-400">ر.س</span>
                            </div>
                        </td>
                        <td class="p-4">
                            <button onclick="savePrice(${product.id})" class="bg-green-500 hover:bg-green-600 text-white text-xs font-bold px-3 py-2 rounded-lg transition cursor-pointer">
                                حفظ 💾
                            </button>
                        </td>
                    </tr>
                `;
            });
        }

        function searchProducts() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const filtered = products.filter(p => p.name.toLowerCase().includes(query) || p.category.toLowerCase().includes(query));
            renderTable(filtered);
        }

        function savePrice(id) {
            const inputVal = document.getElementById(`price-input-${id}`).value;
            const newPrice = parseFloat(inputVal);

            if (isNaN(newPrice) || newPrice < 0) {
                alert("الرجاء إدخال سعر صحيح.");
                return;
            }

            customPrices[id] = newPrice;
            localStorage.setItem('grocery_prices', JSON.stringify(customPrices));

            const prod = products.find(p => p.id === id);
            if (prod) prod.price = newPrice;

            alert(`✅ تم تحديث السعر بنجاح!`);
        }

        function resetAllPrices() {
            if (confirm("هل تريد العودة للأسعار الافتراضية؟")) {
                localStorage.removeItem('grocery_prices');
                location.reload();
            }
        }

        // ================= نظام إدارة وعرض الطلبات الواردة =================
        function loadOrders() {
            const container = document.getElementById('orders-container');
            const orders = JSON.parse(localStorage.getItem('grocery_orders')) || [];

            if (orders.length === 0) {
                container.innerHTML = `<p class="text-slate-400 text-sm text-center py-8 bg-slate-50 rounded-xl border border-dashed border-slate-200">لا توجد طلبات واردة حالياً</p>`;
                return;
            }

            container.innerHTML = '';
            orders.reverse().forEach((order, index) => {
                let itemsList = order.items.map(item => `
                    <div class="flex justify-between text-xs text-slate-600 py-1 border-b border-slate-50">
                        <span>• ${item.name} (عدد: ${item.qty})</span>
                        <span class="font-medium">${(item.price * item.qty).toFixed(2)} ر.س</span>
                    </div>
                `).join('');

                container.innerHTML += `
                    <div class="bg-slate-50 p-4 rounded-xl border border-slate-200 space-y-3">
                        <div class="flex justify-between items-start">
                            <div>
                                <span class="text-xs font-bold text-slate-400">طلب رقم #${order.id || (orders.length - index)}</span>
                                <div class="text-xs text-slate-500 mt-0.5">التوقيت: ${order.date || 'غير محدد'}</div>
                            </div>
                            <span class="text-sm font-bold text-green-600 bg-white px-3 py-1.5 rounded-lg border border-slate-100">
                                الإجمالي: ${order.total}
                            </span>
                        </div>
                        <div class="bg-white p-3 rounded-lg border border-slate-100 divide-y divide-slate-100">
                            ${itemsList}
                        </div>
                        <div class="flex justify-between items-center pt-1">
                            <span class="text-xs font-bold px-2 py-1 rounded bg-amber-50 text-amber-600 border border-amber-100">قيد الانتظار شحنها</span>
                            <button onclick="deleteOrder(${index})" class="text-xs text-red-500 hover:text-red-700 transition font-medium cursor-pointer">🚨 حذف الطلب</button>
                        </div>
                    </div>
                `;
            });
        }

        function deleteOrder(indexFromTop) {
            let orders = JSON.parse(localStorage.getItem('grocery_orders')) || [];
            orders.reverse(); // لكي يتطابق الاندكس المعروض مع الترتيب
            orders.splice(indexFromTop, 1);
            orders.reverse(); // إعادته لوضعه قبل الحفظ
            localStorage.setItem('grocery_orders', JSON.stringify(orders));
            loadOrders();
        }

        function clearAllOrders() {
            if (confirm("هل تريد مسح سجل الطلبات بالكامل؟")) {
                localStorage.removeItem('grocery_orders');
                loadOrders();
            }
        }

        // الاستماع لأي طلبات جديدة تأتي من صفحة المتجر وتحديث القائمة فوراً
        window.addEventListener('storage', (e) => {
            if (e.key === 'grocery_orders') {
                loadOrders();
            }
        });

        // تشغيل الجداول والبيانات
        renderTable(products);
        loadOrders();
    </script>
</body>
</html>
