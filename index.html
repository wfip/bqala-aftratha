<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تموينات صرح الغذاء - المتجر الرقمي</title>
    <!-- Tailwind CSS لتصميم عصري ونظيف -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap');
        body { font-family: 'Tajawal', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <!-- الهيدر والبار العلوي -->
    <header class="bg-white shadow-sm sticky top-0 z-50 border-b border-gray-100">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-green-600 flex items-center gap-2">
                🛒 صرح الغذاء المميز
            </h1>
            <div class="flex items-center gap-4">
                <a href="admin.html" target="_blank" class="text-sm font-medium text-gray-500 hover:text-green-600 transition flex items-center gap-1">
                    ⚙️ لوحة التحكم بالأسعار
                </a>
                <button onclick="toggleCart()" class="relative bg-green-500 text-white px-5 py-2.5 rounded-full font-bold hover:bg-green-600 transition flex items-center gap-2 cursor-pointer shadow-md shadow-green-100">
                    <span>السلة</span>
                    <span id="cart-count" class="bg-white text-green-600 text-xs font-bold px-2 py-0.5 rounded-full">0</span>
                </button>
            </div>
        </div>
    </header>

    <!-- المحتوى والتقسيم -->
    <main class="container mx-auto px-4 py-8 flex flex-col lg:flex-row gap-8">
        
        <!-- قـسـم الـمـنـتـجـات الرئيسي -->
        <div class="w-full lg:w-3/4">
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6">
                <div>
                    <h2 class="text-xl font-bold text-gray-900">تصفح المنتجات الحقيقية</h2>
                    <p class="text-xs text-gray-400 mt-1">يحتوي المتجر على <span id="total-products" class="text-green-600 font-bold">200</span> منتج بقالة دقيق ومصنف.</p>
                </div>
                <select id="category-filter" onchange="filterProducts()" class="border border-gray-200 rounded-xl p-2.5 bg-white text-sm font-medium focus:outline-none focus:ring-2 focus:ring-green-500 cursor-pointer">
                    <option value="all">كل الأقسام والمنتجات</option>
                    <option value="الألبان والأجبان والبيض">الألبان والأجبان والبيض</option>
                    <option value="المعلبات والأغذية المحفوظة">المعلبات والأغذية المحفوظة</option>
                    <option value="المشروبات والعصائر">المشروبات والعصائر</option>
                    <option value="المخبوزات والحلويات">المخبوزات والحلويات</option>
                    <option value="الزيوت والبهارات والمواد الأساسية">الزيوت والبهارات والمواد الأساسية</option>
                    <option value="المنظفات والعناية الشخصية">المنظفات والعناية الشخصية</option>
                </select>
            </div>

            <!-- شبكة عرض المنتجات الـ 200 -->
            <div id="products-grid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-4">
                <!-- جافاسكريبت يتولى بناء المنتجات بصورها الحقيقية هنا -->
            </div>
        </div>

        <!-- قـسـم الـسـلـة الـجـانـبـي التفاعلي -->
        <div id="cart-sidebar" class="w-full lg:w-1/4 bg-white p-6 rounded-2xl shadow-sm border border-gray-100 h-fit lg:sticky lg:top-24">
            <h3 class="text-lg font-bold mb-4 flex items-center justify-between">
                <span>سلة المشتريات 🛍️</span>
                <button onclick="clearCart()" class="text-xs text-red-500 hover:underline font-medium cursor-pointer">حذف الكل</button>
            </h3>
            
            <div id="cart-items" class="space-y-3 max-h-72 overflow-y-auto mb-4">
                <p class="text-gray-400 text-sm text-center py-6">السلة فارغة، أضف منتجات للبدء</p>
            </div>
            
            <hr class="border-gray-100 my-4">
            
            <div class="space-y-2 mb-6">
                <div class="flex justify-between text-sm text-gray-500">
                    <span>عدد القطع:</span>
                    <span id="cart-pieces-count">0 قطة</span>
                </div>
                <div class="flex justify-between font-bold text-lg text-gray-900">
                    <span>الإجمالي النهائي:</span>
                    <span id="cart-total" class="text-green-600">0.00 ر.س</span>
                </div>
            </div>

            <button onclick="checkout()" class="w-full bg-green-500 text-white text-center py-3.5 rounded-xl font-bold hover:bg-green-600 transition shadow-lg shadow-green-100 cursor-pointer text-sm">
                تأكيد وإرسال طلب الشراء 💳
            </button>
        </div>
    </main>

    <!-- نظام الجافاسكريبت والبيانات الحقيقية -->
    <script>
        const categories = [
            "الألبان والأجبان والبيض", "المعلبات والأغذية المحفوظة", "المشروبات والعصائر", 
            "المخبوزات والحلويات", "الزيوت والبهارات والمواد الأساسية", "المنظفات والعناية الشخصية"
        ];

        const realProductsPool = {
            "الألبان والأجبان والبيض": [
                "حليب المراعي كامل الدسم 1 لتر", "حليب نادك قليل الدسم 1 لتر", "لبن المراعي طازج 2 لتر", 
                "زبادي نادك طازج 170 غرام", "قشطة التاج 155 غرام", "جبنة كرافت شيدر علب 100 غرام",
                "جبنة بوك كاسات 500 غرام", "لبنة بينار تركية 400 غرام", "جبنة فيتا المراعي 200 غرام", 
                "بيض دجاج محلي طبق 30 حبة", "زبدة لورباك غير مملحة 100 غرام", "كريمة الطبخ المراعي 500 مل",
                "حليب مكثف محلى نستله 397 غرام", "جبنة موزاريلا مبشورة المراعي 200 غرام", "زبادي يوناني ندى سادة"
            ],
            "المعلبات والأغذية المحفوظة": [
                "تونا قودي تندرينا 80 غرام", "فول مدمس حدائق كاليفورنيا", "فاصوليا حمراء العلالي", 
                "حمص حب أطلس علب", "ذرة حلوة قودي كاملة الحب", "صلصة طماطم السعودية 135 غرام",
                "كاتشب طماطم ليبنز 340 غرام", "مايونيز قودي أصلي 250 مل", "شطة حارة رنا صغيرة",
                "ورق عنب قودي 450 غرام", "مربى الفراولة حلواني 400 غرام", "عسل طبيعي الشفاء 250 غرام"
            ],
            "المشروبات والعصائر": [
                "مياه معدنية نوفا 24×330 مل", "بيبسي علبة 325 مل", "سفن أب علبة 325 مل", 
                "كوكا كولا كين 325 مل", "عصير برتقال ربيع 1 لتر", "عصير تفاح المراعي 200 مل",
                "شاي ربيع إكسبريس 100 كيس", "شاي ليبتون فرط 200 غرام", "قهوة نسكافيه ريد كاب 100 غرام",
                "مشروب فيمتو مركز 710 مل", "آيس تي ليبتون خوخ 320 مل", "مياه غازية بيرين 330 مل"
            ],
            "المخبوزات والحلويات": [
                "خبز توست أبيض لوزين", "خبز صامولي لوزين 6 حبات", "كرواسون لوزين شوكولاتة", 
                "خبز برجر هرفي بالسمسم", "بسكويت شاي ميموريز", "بسكويت ديمة بالتمر",
                "كيك بار لوزين فانيلا", "بطاطس ليز بالملح كبير", "شيبس برينجلز أصلي",
                "شوكولاتة جلاكسي ناعمة", "بسكويت أوريو أصلي", "ويفر لواكر بكريم الكاكاو"
            ],
            "الزيوت والبهارات والمواد الأساسية": [
                "أرز بسمتي الشعلان 5 كغم", "زيت طبخ عافي ذرة 1.5 لتر", "زيت زيتون الوزير 500 مل",
                "سكر الأسرة ناعم 2 كغم", "ملح طعام ساسا يودي", "مكرونة قودي خواتم 450 غرام",
                "شعيرية إندومي دجاج بالثوم", "دقيق كويتي فاخر 1 كغم", "شوفان كويكر علب 500 غرام",
                "مرقة دجاج ماجي 24 مكعب", "خل أبيض رنا 473 مل", "نشا ذرة العلالي 100 غرام"
            ],
            "المنظفات والعناية الشخصية": [
                "صابون صحون فيري بالليمون 1 لتر", "مناديل فاين ناعمة 10×80 منديل", "شامبو بانتين بديل الزيت",
                "صابون ديتول مستر 115 غرام", "معجمعون أسنان كولجيت أصلي", "سائل غسيل ملابس تايد 2.5 لتر",
                "مسترق للجو جليد لافندر", "مبيّض ملابس كلوركس أصلي", "منظف أرضيات داك ورد 3 لتر",
                "شامبو عباءة برسيل 1 لتر", "صابون يدين لايفبوي 200 مل", "شفرات حلاقة جيليت بلو 2"
            ]
        };

        // روابط صور حقيقية دقيقة ومستقرة للأقسام من Unsplash
        const unsplashImages = {
            "الألبان والأجبان والبيض": "https://images.unsplash.com/photo-1550583724-b2692b85b150?w=400&auto=format&fit=crop&q=60",
            "المعلبات والأغذية المحفوظة": "https://images.unsplash.com/photo-1544816155-12df9643f363?w=400&auto=format&fit=crop&q=60",
            "المشروبات والعصائر": "https://images.unsplash.com/photo-1622483767028-3f66f32aef97?w=400&auto=format&fit=crop&q=60",
            "المخبوزات والحلويات": "https://images.unsplash.com/photo-1509440159596-0249088772ff?w=400&auto=format&fit=crop&q=60",
            "الزيوت والبهارات والمواد الأساسية": "https://images.unsplash.com/photo-1474979266404-7eaacbcd87c5?w=400&auto=format&fit=crop&q=60",
            "المنظفات والعناية الشخصية": "https://images.unsplash.com/photo-1584622650111-993a426fbf0a?w=400&auto=format&fit=crop&q=60"
        };

        let products = [];
        let customPrices = JSON.parse(localStorage.getItem('grocery_prices')) || {};

        // حلقة ذكية لبناء 200 منتج بالضبط وبأسماء متناسقة وحقيقية
        let idCounter = 1;
        while (products.length < 200) {
            for (let cat of categories) {
                if (products.length >= 200) break;
                
                let pool = realProductsPool[cat];
                let poolIndex = (idCounter - 1) % pool.length;
                let baseName = pool[poolIndex];
                
                let iteration = Math.floor((idCounter - 1) / pool.length);
                let suffix = iteration > 0 ? ` (حجم عائلي أو عبوة إضافية ${iteration})` : "";
                
                let itemId = idCounter;
                let defaultPrice = ((idCounter % 18) + 4.75); // تسعير افتراضي منطقي
                let finalPrice = customPrices[itemId] ? customPrices[itemId] : defaultPrice;

                products.push({
                    id: itemId,
                    name: `${baseName}${suffix}`,
                    category: cat,
                    price: parseFloat(finalPrice),
                    image: unsplashImages[cat]
                });
                idCounter++;
            }
        }

        let cart = [];

        // عرض المنتجات في الواجهة
        function displayProducts(items) {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = '';
            
            items.forEach(product => {
                grid.innerHTML += `
                    <div class="bg-white rounded-2xl p-4 border border-gray-100 hover:shadow-md transition flex flex-col justify-between">
                        <div>
                            <img src="${product.image}" alt="${product.name}" class="w-full h-32 object-cover rounded-xl mb-3 bg-gray-50">
                            <span class="text-[10px] text-green-700 bg-green-50 font-bold px-2 py-1 rounded-md block w-fit">${product.category}</span>
                            <h4 class="font-bold text-sm mt-2 text-gray-700 line-clamp-2 leading-snug h-10">${product.name}</h4>
                        </div>
                        <div class="mt-4">
                            <div class="text-green-600 font-bold text-base mb-3">${product.price.toFixed(2)} ر.س</div>
                            <div class="flex gap-2">
                                <button onclick="addToCart(${product.id})" class="flex-1 bg-green-50 text-green-600 hover:bg-green-500 hover:text-white text-xs font-bold py-2.5 rounded-xl transition cursor-pointer">
                                    + إضافة السلة
                                </button>
                                <button onclick="removeFromCart(${product.id})" class="bg-red-50 text-red-500 hover:bg-red-500 hover:text-white text-xs font-bold px-3 rounded-xl transition cursor-pointer" title="حذف حبة">
                                    - إلغاء
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function filterProducts() {
            const cat = document.getElementById('category-filter').value;
            if (cat === 'all') {
                displayProducts(products);
            } else {
                const filtered = products.filter(p => p.category === cat);
                displayProducts(filtered);
            }
        }

        function addToCart(id) {
            const product = products.find(p => p.id === id);
            const cartItem = cart.find(item => item.id === id);
            
            if (cartItem) {
                cartItem.qty++;
            } else {
                cart.push({ ...product, qty: 1 });
            }
            updateCartUI();
        }

        function removeFromCart(id) {
            const cartItem = cart.find(item => item.id === id);
            if (cartItem) {
                cartItem.qty--;
                if (cartItem.qty <= 0) {
                    cart = cart.filter(item => item.id !== id);
                }
            }
            updateCartUI();
        }

        function clearCart() {
            cart = [];
            updateCartUI();
        }

        function updateCartUI() {
            const cartItemsContainer = document.getElementById('cart-items');
            const cartCount = document.getElementById('cart-count');
            const piecesCount = document.getElementById('cart-pieces-count');
            const cartTotal = document.getElementById('cart-total');
            
            if (cart.length === 0) {
                cartItemsContainer.innerHTML = '<p class="text-gray-400 text-sm text-center py-6">السلة فارغة، أضف منتجات للبدء</p>';
                cartCount.innerText = '0';
                piecesCount.innerText = '0 قطعة';
                cartTotal.innerText = '0.00 ر.س';
                return;
            }

            cartItemsContainer.innerHTML = '';
            let total = 0;
            let totalQty = 0;

            cart.forEach(item => {
                let itemTotal = item.price * item.qty;
                total += itemTotal;
                totalQty += item.qty;

                cartItemsContainer.innerHTML += `
                    <div class="flex justify-between items-center bg-gray-50 p-2.5 rounded-xl text-xs border border-gray-100">
                        <div class="ml-2">
                            <p class="font-bold text-gray-800">${item.name}</p>
                            <p class="text-gray-400 mt-0.5">${item.price.toFixed(2)} ر.س × ${item.qty}</p>
                        </div>
                        <span class="font-bold text-gray-700 whitespace-nowrap">${itemTotal.toFixed(2)} ر.س</span>
                    </div>
                `;
            });

            cartCount.innerText = totalQty;
            piecesCount.innerText = `${totalQty} قطعة`;
            cartTotal.innerText = total.toFixed(2) + ' ر.س';
        }

        function checkout() {
            if (cart.length === 0) {
                alert("السلة فارغة حالياً! قم بإضافة المنتجات الحقيقية أولاً.");
                return;
            }
            let orderDetails = cart.map(item => `- ${item.name} (العدد: ${item.qty})`).join('\n');
            let totalStr = document.getElementById('cart-total').innerText;
            
            alert(`🎉 تم إرسال الطلب بنجاح إلى بقالة صرح الغذاء!\n\nقائمة المشتريات:\n${orderDetails}\n\nالحساب الإجمالي: ${totalStr}`);
            clearCart();
        }

        // تشغيل فوري وتوليد المنتجات
        displayProducts(products);
    </script>
</body>
</html>
