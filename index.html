<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تموينات صرح الغذاء</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@500;700&display=swap');
        body { font-family: 'Tajawal', sans-serif; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 antialiased">

    <!-- الهيدر متوافق مع شاشات الجوال والآيفون -->
    <header class="bg-white shadow-sm sticky top-0 z-50 border-b border-gray-100 safe-top">
        <div class="container mx-auto px-4 py-3.5 flex justify-between items-center">
            <h1 class="text-lg font-bold text-green-600">🛒 صرح الغذاء</h1>
            <div class="flex items-center gap-3">
                <a href="admin.html" target="_blank" class="text-[11px] text-gray-400">⚙️ الإدارة</a>
                <button onclick="document.getElementById('cart-sidebar').scrollIntoView({behavior: 'smooth'})" class="bg-green-500 text-white px-4 py-2 rounded-full font-bold text-xs flex items-center gap-1.5 shadow-sm active:scale-95 transition">
                    <span>السلة</span>
                    <span id="cart-count" class="bg-white text-green-600 text-[10px] px-1.5 py-0.5 rounded-full">0</span>
                </button>
            </div>
        </div>
    </header>

    <!-- المحتوى المرن لجميع الأجهزة -->
    <main class="container mx-auto px-3 py-4 flex flex-col lg:flex-row gap-6">
        
        <!-- الأقسام والمنتجات -->
        <div class="w-full lg:w-3/4 space-y-4">
            <!-- أشرطة الأقسام السريعة -->
            <div class="overflow-x-auto no-scrollbar whitespace-nowrap py-2 flex gap-2 scroll-smooth">
                <button onclick="filterByTabs('all', this)" class="category-btn inline-block bg-green-600 text-white px-4 py-2 rounded-xl text-xs font-bold shadow-xs border border-transparent transition cursor-pointer">✨ الكل</button>
                <button onclick="filterByTabs('المشروبات والعصائر', this)" class="category-btn inline-block bg-white text-gray-700 hover:bg-gray-100 px-4 py-2 rounded-xl text-xs font-bold border border-gray-200 transition cursor-pointer">🥤 المشروبات والعصائر</button>
                <button onclick="filterByTabs('الألبان والأجبان والبيض', this)" class="category-btn inline-block bg-white text-gray-700 hover:bg-gray-100 px-4 py-2 rounded-xl text-xs font-bold border border-gray-200 transition cursor-pointer">🥛 الألبان والأجبان</button>
                <button onclick="filterByTabs('المعلبات والأغذية', this)" class="category-btn inline-block bg-white text-gray-700 hover:bg-gray-100 px-4 py-2 rounded-xl text-xs font-bold border border-gray-200 transition cursor-pointer">🥫 المعلبات والأغذية</button>
                <button onclick="filterByTabs('المخبوزات والحلويات', this)" class="category-btn inline-block bg-white text-gray-700 hover:bg-gray-100 px-4 py-2 rounded-xl text-xs font-bold border border-gray-200 transition cursor-pointer">🍞 المخبوزات</button>
                <button onclick="filterByTabs('الزيوت والمواد الأساسية', this)" class="category-btn inline-block bg-white text-gray-700 hover:bg-gray-100 px-4 py-2 rounded-xl text-xs font-bold border border-gray-200 transition cursor-pointer">🧂 المواد الأساسية</button>
                <button onclick="filterByTabs('المنظفات والعناية', this)" class="category-btn inline-block bg-white text-gray-700 hover:bg-gray-100 px-4 py-2 rounded-xl text-xs font-bold border border-gray-200 transition cursor-pointer">🧼 المنظفات</button>
            </div>

            <!-- شبكة عرض المنتجات الـ 200 بدون صور -->
            <div id="products-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3"></div>
        </div>

        <!-- السلة الجانبية المتوافقة مع اللمس -->
        <div id="cart-sidebar" class="w-full lg:w-1/4 bg-white p-5 rounded-2xl shadow-sm border border-gray-100 h-fit lg:sticky lg:top-20">
            <h3 class="text-sm font-bold mb-3 flex items-center justify-between">
                <span>طلباتك الحالية 🛍️</span>
                <button onclick="clearCart()" class="text-[11px] text-red-500 font-bold">حذف الكل</button>
            </h3>
            <div id="cart-items" class="space-y-2 max-h-60 overflow-y-auto mb-3 text-xs">
                <p class="text-gray-400 text-center py-4">السلة فارغة</p>
            </div>
            <hr class="border-gray-100 my-3">
            <div class="flex justify-between font-bold text-sm text-gray-900 mb-4">
                <span>الإجمالي النهائي:</span>
                <span id="cart-total" class="text-green-600">0.00 ر.س</span>
            </div>
            <button onclick="showLocationPrompt()" class="w-full bg-green-500 text-white text-center py-3 rounded-xl font-bold hover:bg-green-600 active:scale-98 transition shadow-md text-xs cursor-pointer">
                تأكيد وإرسال طلب الشراء 💳
            </button>
        </div>
    </main>

    <!-- إشعار طلب إذن الموقع المطور (iOS / نظام التطبيقات المحاكي) -->
    <div id="location-modal" class="fixed inset-0 bg-black/40 backdrop-blur-xs z-[100] flex items-center justify-center p-4 hidden">
        <div class="bg-white/95 rounded-2xl max-w-xs w-full text-center overflow-hidden shadow-2xl border border-gray-100 animate-fade-in">
            <div class="p-5 space-y-2">
                <div class="text-2xl">📍</div>
                <h4 class="font-bold text-sm text-gray-900">السماح لـ "صرح الغذاء" بالوصول إلى موقعك؟</h4>
                <p class="text-[11px] text-gray-500 leading-relaxed">نحتاج إلى موقعك الجغرافي الحالي لنتمكن من توجيه المندوب وتوصيل طلبات التموينات إلى باب بيتك بدقة وبدون تأخير.</p>
            </div>
            <!-- أزرار خيارات التطبيق الافتراضية -->
            <div class="border-t border-gray-200 grid grid-cols-2 text-xs divide-x divide-x-reverse divide-gray-200">
                <button onclick="requestGeoLocation()" class="py-3 text-blue-600 font-bold active:bg-gray-100 cursor-pointer">السماح أثناء استخدام التطبيق</button>
                <button onclick="denyGeoLocation()" class="py-3 text-gray-400 font-medium active:bg-gray-100 cursor-pointer">عدم السماح</button>
            </div>
        </div>
    </div>

    <!-- إشعار نجاح الطلب العائم التلقائي -->
    <div id="success-toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-5 py-3 rounded-xl text-xs font-bold shadow-xl flex items-center gap-2 z-[110] transition-all duration-300 translate-y-20 opacity-0 pointer-events-none">
        <span class="text-green-400">🎉</span> تم إرسال طلبك بنجاح! رقم الطلب: <span id="toast-order-id" class="text-green-400">#0000</span>
    </div>

    <script>
        const categories = ["المشروبات والعصائر", "الألبان والأجبان والبيض", "المعلبات والأغذية", "المخبوزات والحلويات", "الزيوت والمواد الأساسية", "المنظفات والعناية"];
        const pool = {
            "المشروبات والعصائر": [{name:"بيبسي علبة"}, {name:"سفن أب"}, {name:"كوكا كولا"}, {name:"مياه نوفا كرتون"}, {name:"عصير ربيع برتقال"}, {name:"فيمتو مركز"}, {name:"آيس تي ليبتون خوخ"}],
            "الألبان والأجبان والبيض": [{name:"حليب المراعي كامل"}, {name:"حليب نادك قليل"}, {name:"لبن المراعي طازج"}, {name:"زبادي نادك"}, {name:"قشطة التاج"}, {name:"جبنة كرافت شيدر"}, {name:"جبنة بوك كاسات"}, {name:"بيض طبق 30 حبة"}],
            "المعلبات والأغذية": [{name:"تونا قودي"}, {name:"فول مدمس حدائق"}, {name:"فاصوليا حمراء"}, {name:"حمص حب علب"}, {name:"ذرة حلوة قودي"}, {name:"صلصة طماطم السعودية"}],
            "المخبوزات والحلويات": [{name:"توست أبيض لوزين"}, {name:"خبز صامولي لوزين"}, {name:"بطاطس ليز كبير"}],
            "الزيوت والمواد الأساسية": [{name:"أرز بسمتي الشعلان"}, {name:"زيت طبخ عافي"}],
            "المنظفات والعناية": [{name:"صابون فيري ليمون"}, {name:"مناديل فاين ناعمة"}]
        };

        let products = [], cart = [];
        let currentSelectedCategory = 'all';
        let customPrices = JSON.parse(localStorage.getItem('grocery_prices')) || {};

        let id = 1;
        while(products.length < 200) {
            categories.forEach(cat => {
                if(products.length >= 200) return;
                let items = pool[cat], item = items[(id-1) % items.length];
                let loop = Math.floor((id-1)/items.length), suffix = loop > 0 ? ` - حزمة ${loop+1}` : "";
                let price = customPrices[id] || ((id % 15) + 5.50);
                products.push({id, name: item.name + suffix, category: cat, price: parseFloat(price)});
                id++;
            });
        }

        function displayProducts(items) {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = '';
            items.forEach(p => {
                let cartItem = cart.find(item => item.id === p.id);
                let qty = cartItem ? cartItem.qty : 0;
                grid.innerHTML += `
                    <div class="bg-white rounded-xl p-3 border border-gray-100 flex items-center justify-between shadow-xs">
                        <div class="flex-1 pr-1">
                            <span class="text-[9px] text-gray-400 block">${p.category}</span>
                            <h4 class="font-bold text-xs text-gray-800 mt-0.5 leading-tight">${p.name}</h4>
                            <div class="text-green-600 font-bold text-xs mt-1">${p.price.toFixed(2)} ر.س</div>
                        </div>
                        <div class="flex items-center bg-gray-50 rounded-lg p-1 border border-gray-100 gap-2">
                            <button onclick="updateQty(${p.id}, -1)" class="w-6 h-6 rounded bg-white border border-gray-200 text-gray-600 font-bold text-center flex items-center justify-center active:bg-gray-100 cursor-pointer">-</button>
                            <span id="item-qty-${p.id}" class="text-xs font-bold w-4 text-center text-gray-800">${qty}</span>
                            <button onclick="updateQty(${p.id}, 1)" class="w-6 h-6 rounded bg-green-500 text-white font-bold text-center flex items-center justify-center active:bg-green-600 cursor-pointer">+</button>
                        </div>
                    </div>`;
            });
        }

        function filterByTabs(category, btnElement) {
            currentSelectedCategory = category;
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.classList.remove('bg-green-600', 'text-white', 'border-transparent');
                btn.classList.add('bg-white', 'text-gray-700', 'border-gray-200');
            });
            btnElement.classList.remove('bg-white', 'text-gray-700', 'border-gray-200');
            btnElement.classList.add('bg-green-600', 'text-white', 'border-transparent');
            displayProducts(category === 'all' ? products : products.filter(p => p.category === category));
        }

        function updateQty(id, change) {
            let p = products.find(prod => prod.id === id);
            let item = cart.find(c => c.id === id);
            if (!item && change > 0) cart.push({...p, qty: 1});
            else if (item) {
                item.qty += change;
                if(item.qty <= 0) cart = cart.filter(c => c.id !== id);
            }
            let el = document.getElementById(`item-qty-${id}`);
            if(el) el.innerText = cart.find(c => c.id === id) ? cart.find(c => c.id === id).qty : 0;
            updateCartUI();
        }

        function clearCart() { 
            cart = []; updateCartUI(); 
            displayProducts(currentSelectedCategory === 'all' ? products : products.filter(p => p.category === currentSelectedCategory));
        }

        function updateCartUI() {
            const container = document.getElementById('cart-items');
            if(cart.length === 0) {
                container.innerHTML = '<p class="text-gray-400 text-center py-4">السلة فارغة</p>';
                document.getElementById('cart-count').innerText = '0';
                document.getElementById('cart-total').innerText = '0.00 ر.س';
                return;
            }
            container.innerHTML = '';
            let total = 0, count = 0;
            cart.forEach(c => {
                total += c.price * c.qty; count += c.qty;
                container.innerHTML += `
                    <div class="flex justify-between bg-gray-50 p-2 rounded-lg border border-gray-100">
                        <div><p class="font-bold">${c.name}</p><p class="text-[10px] text-gray-400">${c.price.toFixed(2)} ر.س × ${c.qty}</p></div>
                        <span class="font-bold text-gray-700">${(c.price * c.qty).toFixed(2)} ر.س</span>
                    </div>`;
            });
            document.getElementById('cart-count').innerText = count;
            document.getElementById('cart-total').innerText = total.toFixed(2) + ' ر.س';
        }

        // إظهار نافذة إشعار الإذن المخصصة بدلاً من الـ alert التقليدي
        function showLocationPrompt() {
            if(cart.length === 0) { showCustomToast("السلة فارغة!", true); return; }
            document.getElementById('location-modal').classList.remove('hidden');
        }

        function hideLocationPrompt() {
            document.getElementById('location-modal').classList.add('hidden');
        }

        // في حال ضغط العميل موافقة وسماح
        function requestGeoLocation() {
            hideLocationPrompt();
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => sendOrder({lat: pos.coords.latitude, lng: pos.coords.longitude}),
                    () => { sendOrder(null); }
                );
            } else { sendOrder(null); }
        }

        // في حال ضغط العميل رفض
        function denyGeoLocation() {
            hideLocationPrompt();
            sendOrder(null);
        }

        function sendOrder(coords) {
            let orders = JSON.parse(localStorage.getItem('grocery_orders')) || [];
            let orderId = Math.floor(1000 + Math.random()*9000);
            let newOrder = { 
                id: orderId, 
                date: new Date().toLocaleString('ar-EG'), 
                items: cart.map(i => ({name: i.name, qty: i.qty, price: i.price})), 
                total: document.getElementById('cart-total').innerText, 
                location: coords 
            };
            orders.push(newOrder);
            localStorage.setItem('grocery_orders', JSON.stringify(orders));
            
            // تشغيل التنبيه المطور لإظهار نجاح الطلب
            showCustomToast(orderId);
            clearCart();
        }

        // محاكاة إشعار النظام لنجاح الطلب من أسفل الشاشة
        function showCustomToast(orderId, isError = false) {
            const toast = document.getElementById('success-toast');
            if(isError) {
                toast.innerHTML = `⚠️ ${orderId}`;
            } else {
                toast.innerHTML = `<span class="text-green-400">🎉</span> تم إرسال طلبك بنجاح! رقم الطلب: <span class="text-green-400">#${orderId}</span>`;
            }
            toast.classList.remove('translate-y-20', 'opacity-0', 'pointer-events-none');
            setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0', 'pointer-events-none');
            }, 4000);
        }

        window.addEventListener('storage', (e) => {
            if(e.key === 'grocery_prices') {
                customPrices = JSON.parse(e.newValue) || {};
                products.forEach(p => { if(customPrices[p.id]) p.price = parseFloat(customPrices[p.id]); });
                displayProducts(currentSelectedCategory === 'all' ? products : products.filter(p => p.category === currentSelectedCategory));
            }
        });

        displayProducts(products);
    </script>
</body>
</html>
