<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تموينات صرح الغذاء - المتجر الرقمي المطور</title>
    <!-- Tailwind CSS لتصميم مرتب ونظيف -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap');
        body { font-family: 'Tajawal', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <!-- الهيدر والبار العلوي -->
    <header class="bg-white shadow-sm sticky top-0 z-50 border-b border-gray-100">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-green-600 flex items-center gap-2">
                🛒 صرح الغذاء المميز
            </h1>
            <div class="flex items-center gap-4">
                <a href="admin.html" target="_blank" class="text-sm font-medium text-gray-500 hover:text-green-600 transition flex items-center gap-1">
                    ⚙️ لوحة التحكم بالأسعار
                </a>
                <button onclick="toggleCart()" class="relative bg-green-500 text-white px-5 py-2.5 rounded-full font-bold hover:bg-green-600 transition flex items-center gap-2 cursor-pointer shadow-md shadow-green-100">
                    <span>السلة</span>
                    <span id="cart-count" class="bg-white text-green-600 text-xs font-bold px-2 py-0.5 rounded-full">0</span>
                </button>
            </div>
        </div>
    </header>

    <!-- المحتوى والتقسيم -->
    <main class="container mx-auto px-4 py-8 flex flex-col lg:flex-row gap-8">
        
        <!-- قـسـم الـمـنـتـجـات الرئيسي -->
        <div class="w-full lg:w-3/4">
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6">
                <div>
                    <h2 class="text-xl font-bold text-gray-900">تصفح المنتجات الحقيقية</h2>
                    <p class="text-xs text-gray-400 mt-1">يحتوي المتجر على <span id="total-products" class="text-green-600 font-bold">200</span> منتج مصنف بصور دقيقة لكل سلعة.</p>
                </div>
                <select id="category-filter" onchange="filterProducts()" class="border border-gray-200 rounded-xl p-2.5 bg-white text-sm font-medium focus:outline-none focus:ring-2 focus:ring-green-500 cursor-pointer">
                    <option value="all">كل الأقسام والمنتجات</option>
                    <option value="الألبان والأجبان والبيض">الألبان والأجبان والبيض</option>
                    <option value="المعلبات والأغذية المحفوظة">المعلبات والأغذية المحفوظة</option>
                    <option value="المشروبات والعصائر">المشروبات والعصائر</option>
                    <option value="المخبوزات والحلويات">المخبوزات والحلويات</option>
                    <option value="الزيوت والبهارات والمواد الأساسية">الزيوت والبهارات والمواد الأساسية</option>
                    <option value="المنظفات والعناية الشخصية">المنظفات والعناية الشخصية</option>
                </select>
            </div>

            <!-- شبكة عرض المنتجات الـ 200 -->
            <div id="products-grid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-4">
                <!-- جافاسكريبت يبني المنتجات هنا -->
            </div>
        </div>

        <!-- قـسـم الـسـلـة الـجـانـبـي -->
        <div id="cart-sidebar" class="w-full lg:w-1/4 bg-white p-6 rounded-2xl shadow-sm border border-gray-100 h-fit lg:sticky lg:top-24">
            <h3 class="text-lg font-bold mb-4 flex items-center justify-between">
                <span>سلة المشتريات 🛍️</span>
                <button onclick="clearCart()" class="text-xs text-red-500 hover:underline font-medium cursor-pointer">حذف الكل</button>
            </h3>
            
            <div id="cart-items" class="space-y-3 max-h-72 overflow-y-auto mb-4">
                <p class="text-gray-400 text-sm text-center py-6">السلة فارغة، أضف منتجات للبدء</p>
            </div>
            
            <hr class="border-gray-100 my-4">
            
            <div class="space-y-2 mb-6">
                <div class="flex justify-between text-sm text-gray-500">
                    <span>عدد القطع:</span>
                    <span id="cart-pieces-count">0 قطعة</span>
                </div>
                <div class="flex justify-between font-bold text-lg text-gray-900">
                    <span>الإجمالي النهائي:</span>
                    <span id="cart-total" class="text-green-600">0.00 ر.س</span>
                </div>
            </div>

            <button onclick="checkout()" class="w-full bg-green-500 text-white text-center py-3.5 rounded-xl font-bold hover:bg-green-600 transition shadow-lg shadow-green-100 cursor-pointer text-sm">
                تأكيد وإرسال طلب الشراء 💳
            </button>
        </div>
    </main>

    <!-- نظام الجافاسكريبت والبيانات الحقيقية الدقيقة -->
    <script>
        const categories = [
            "الألبان والأجبان والبيض", "المعلبات والأغذية المحفوظة", "المشروبات والعصائر", 
            "المخبوزات والحلويات", "الزيوت والبهارات والمواد الأساسية", "المنظفات والعناية الشخصية"
        ];

        // مصفوفة المنتجات مع رابط صورة مخصص ودقيق لكل منتج من Unsplash لمنع تداخل الصور

                { name: "جبنة بوك كاسات 500 غرام", img: "https://images.unsplash.com/photo-1552763442-159ac9a24dce?w=400" },

                { name: "بيض دجاج محلي طبق 30 حبة", img: "https://images.unsplash.com/photo-1516448620398-c5f44bf9f441?w=400" },
                { name: "زبدة لورباك غير مملحة 100 غرام", img: "https://images.unsplash.com/photo-1589985270826-4b7bb135bc9d?w=400" },
                { name: "كريمة الطبخ المراعي 500 مل", img: "https://images.unsplash.com/photo-1600431521340-491eca880813?w=400" }
            ],
            "المعلبات والأغذية المحفوظة": [
                { name: "تونا قودي تندرينا 80 غرام", img: "https://images.unsplash.com/photo-1534422298391-e4f8c172dddb?w=400" },
                { name: "فول مدمس حدائق كاليفورنيا", img: "https://images.unsplash.com/photo-1544816155-12df9643f363?w=400" },
                { name: "فاصوليا حمراء العلالي", img: "https://images.unsplash.com/photo-1546833999-b9f581a1996d?w=400" },
                { name: "حمص حب أطلس علب", img: "https://images.unsplash.com/photo-1536147116438-62679a5e01f2?w=400" },
                { name: "ذرة حلوة قودي كاملة الحب", img: "https://images.unsplash.com/photo-1551782450-a2132b4ba21d?w=400" },
                { name: "صلصة طماطم السعودية 135 غرام", img: "https://images.unsplash.com/photo-1607305387299-a3d9611cd46f?w=400" },
                { name: "كاتشب طماطم ليبنز 340 غرام", img: "https://images.unsplash.com/photo-1607305387299-a3d9611cd46f?w=400" },
                { name: "مايونيز قودي أصلي 250 مل", img: "https://images.unsplash.com/photo-1585325701165-351af916e581?w=400" },
                { name: "شطة حارة رنا صغيرة", img: "https://images.unsplash.com/photo-1601004890684-d8cbf643f5cf?w=400" },
                { name: "ورق عنب قودي 450 غرام", img: "https://images.unsplash.com/photo-1626132647523-66f5bf380027?w=400" }
            ],
            "المشروبات والعصائر": [
                { name: "بيبسي علبة 325 مل", img: "https://images.unsplash.com/photo-1622483767028-3f66f32aef97?w=400" }, // بيبسي حقيقي كولا
                { name: "سفن أب علبة 325 مل", img: "https://images.unsplash.com/photo-1543257580-7269da773bf5?w=400" }, // سفن أب ليمون أخضر حقيقي
                { name: "كوكا كولا كين 325 مل", img: "https://images.unsplash.com/photo-1554866585-cd94860890b7?w=400" }, // كوكا كولا حمراء
                { name: "مياه معدنية نوفا 24×330 مل", img: "https://images.unsplash.com/photo-1608885898957-a599fb15d841?w=400" }, // مياه عذبة
                { name: "عصير برتقال ربيع 1 لتر", img: "https://images.unsplash.com/photo-1613478223719-2ab802602423?w=400" },
                { name: "عصير تفاح المراعي 200 مل", img: "https://images.unsplash.com/photo-1568644391678-478a7726b2b7?w=400" },
                { name: "شاي ربيع إكسبريس 100 كيس", img: "https://images.unsplash.com/photo-1576092768241-dec231879fc3?w=400" },
                { name: "شاي ليبتون فرط 200 غرام", img: "https://images.unsplash.com/photo-1597481499750-3e6b22637e12?w=400" },
                { name: "قهوة نسكافيه ريد كاب 100 غرام", img: "https://images.unsplash.com/photo-1514432324607-a09d9b4aefdd?w=400" },
                { name: "مشروب فيمتو مركز 710 مل", img: "https://images.unsplash.com/photo-1513558161293-cdaf765ed2fd?w=400" },
                { name: "آيس تي ليبتون خوخ 320 مل", img: "https://images.unsplash.com/photo-1556679343-c7306c1976bc?w=400" },
                { name: "مياه غازية بيرين 330 مل", img: "https://images.unsplash.com/photo-1551782450-a2132b4ba21d?w=400" }
            ],
            "المخبوزات والحلويات": [
                { name: "خبز توست أبيض لوزين", img: "https://images.unsplash.com/photo-1509440159596-0249088772ff?w=400" },
                { name: "خبز صامولي لوزين 6 حبات", img: "https://images.unsplash.com/photo-1549931319-a545dcf3bc73?w=400" },
                { name: "كرواسون لوزين شوكولاتة", img: "https://images.unsplash.com/photo-1555507036-ab1f4038808a?w=400" },
                { name: "خبز برجر هرفي بالسمسم", img: "https://images.unsplash.com/photo-1586190848861-99aa4a171e90?w=400" },
                { name: "بسكويت شاي ميموريز", img: "https://images.unsplash.com/photo-1558961309-db03b77e584d?w=400" },
                { name: "بطاطس ليز بالملح كبير", img: "https://images.unsplash.com/photo-1566478431344-19515568bc1b?w=400" },
                { name: "شيبس برينجلز أصلي", img: "https://images.unsplash.com/photo-1518047601542-79f18c655718?w=400" },
                { name: "شوكولاتة جلاكسي ناعمة", img: "https://images.unsplash.com/photo-1511381939415-e44015466834?w=400" },
                { name: "بسكويت أوريو أصلي", img: "https://images.unsplash.com/photo-1553177595-4de2bb0842b9?w=400" }
            ],
            "الزيوت والبهارات والمواد الأساسية": [
                { name: "أرز بسمتي الشعلان 5 كغم", img: "https://images.unsplash.com/photo-1586201375761-83865001e31c?w=400" },
                { name: "زيت طبخ عافي ذرة 1.5 لتر", img: "https://images.unsplash.com/photo-1474979266404-7eaacbcd87c5?w=400" },
                { name: "زيت زيتون الوزير 500 مل", img: "https://images.unsplash.com/photo-1471193945509-9ad0617afabf?w=400" },
                { name: "سكر الأسرة ناعم 2 كغم", img: "https://images.unsplash.com/photo-1581783898377-1c85bf937427?w=400" },
                { name: "ملح طعام ساسا يودي", img: "https://images.unsplash.com/photo-1618213813773-0f08ecf090b5?w=400" },
                { name: "مكرونة قودي خواتم 450 غرام", img: "https://images.unsplash.com/photo-1551462147-ff29053bfc14?w=400" },
                { name: "شعيرية إندومي دجاج بالثوم", img: "https://images.unsplash.com/photo-1569718212165-3a8278d5f624?w=400" },
                { name: "دقيق كويتي فاخر 1 كغم", img: "https://images.unsplash.com/photo-1574316071802-0d684efa7bf5?w=400" },
                { name: "شوفان كويكر علب 500 غرام", img: "https://images.unsplash.com/photo-1586444248902-2f64eddc13df?w=400" }
            ],
            "المنظفات والعناية الشخصية": [
                { name: "صابون صحون فيري بالليمون 1 لتر", img: "https://images.unsplash.com/photo-1607006342456-ba274cb2269f?w=400" },
                { name: "مناديل فاين ناعمة 10×80 منديل", img: "https://images.unsplash.com/photo-1584622650111-993a426fbf0a?w=400" },
                { name: "شامبو بانتين بديل الزيت", img: "https://images.unsplash.com/photo-1535585209827-a15fcdbc4c2d?w=400" },
                { name: "صابون ديتول مستر 115 غرام", img: "https://images.unsplash.com/photo-1607006342456-ba274cb2269f?w=400" },
                { name: "معجون أسنان كولجيت أصلي", img: "https://images.unsplash.com/photo-1559599101-f09722fb4948?w=400" },
                { name: "سائل غسيل ملابس تايد 2.5 لتر", img: "https://images.unsplash.com/photo-1610557892470-55d9e80e0b96?w=400" }
            ]
        };

        let products = [];
        let customPrices = JSON.parse(localStorage.getItem('grocery_prices')) || {};

        // توليد الـ 200 منتج حقيقي وربط كل منتج بصورته الحقيقية المحددة في المصفوفة بالأعلى
        let idCounter = 1;
        while (products.length < 200) {
            for (let cat of categories) {
                if (products.length >= 200) break;
                
                let pool = realProductsPool[cat];
                let poolIndex = (idCounter - 1) % pool.length;
                let currentItem = pool[poolIndex];
                
                let iteration = Math.floor((idCounter - 1) / pool.length);
                let suffix = iteration > 0 ? ` (عبوة إضافية ${iteration + 1})` : "";
                
                let itemId = idCounter;
                let defaultPrice = ((idCounter % 15) + 5.50);
                let finalPrice = customPrices[itemId] ? customPrices[itemId] : defaultPrice;

                products.push({
                    id: itemId,
                    name: `${currentItem.name}${suffix}`,
                    category: cat,
                    price: parseFloat(finalPrice),
                    image: currentItem.img // الصورة الدقيقة للمنتج
                });
                idCounter++;
            }
        }

        let cart = [];

        function displayProducts(items) {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = '';
            
            items.forEach(product => {
                grid.innerHTML += `
                    <div class="bg-white rounded-2xl p-4 border border-gray-100 hover:shadow-md transition flex flex-col justify-between">
                        <div>
                            <img src="${product.image}" alt="${product.name}" class="w-full h-32 object-cover rounded-xl mb-3 bg-gray-50">
                            <span class="text-[10px] text-green-700 bg-green-50 font-bold px-2 py-1 rounded-md block w-fit">${product.category}</span>
                            <h4 class="font-bold text-sm mt-2 text-gray-700 line-clamp-2 leading-snug h-10">${product.name}</h4>
                        </div>
                        <div class="mt-4">
                            <div class="text-green-600 font-bold text-base mb-3">${product.price.toFixed(2)} ر.س</div>
                            <div class="flex gap-2">
                                <button onclick="addToCart(${product.id})" class="flex-1 bg-green-50 text-green-600 hover:bg-green-500 hover:text-white text-xs font-bold py-2.5 rounded-xl transition cursor-pointer">
                                    + إضافة السلة
                                </button>
                                <button onclick="removeFromCart(${product.id})" class="bg-red-50 text-red-500 hover:bg-red-500 hover:text-white text-xs font-bold px-3 rounded-xl transition cursor-pointer" title="حذف حبة">
                                    - إلغاء
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function filterProducts() {
            const cat = document.getElementById('category-filter').value;
            if (cat === 'all') {
                displayProducts(products);
            } else {
                const filtered = products.filter(p => p.category === cat);
                displayProducts(filtered);
            }
        }

        function addToCart(id) {
            const product = products.find(p => p.id === id);
            const cartItem = cart.find(item => item.id === id);
            if (cartItem) {
                cartItem.qty++;
            } else {
                cart.push({ ...product, qty: 1 });
            }
            updateCartUI();
        }

        function removeFromCart(id) {
            const cartItem = cart.find(item => item.id === id);
            if (cartItem) {
                cartItem.qty--;
                if (cartItem.qty <= 0) {
                    cart = cart.filter(item => item.id !== id);
                }
            }
            updateCartUI();
        }

        function clearCart() {
            cart = [];
            updateCartUI();
        }

        function updateCartUI() {
            const cartItemsContainer = document.getElementById('cart-items');
            const cartCount = document.getElementById('cart-count');
            const piecesCount = document.getElementById('cart-pieces-count');
            const cartTotal = document.getElementById('cart-total');
            
            if (cart.length === 0) {
                cartItemsContainer.innerHTML = '<p class="text-gray-400 text-sm text-center py-6">السلة فارغة، أضف منتجات للبدء</p>';
                cartCount.innerText = '0';
                piecesCount.innerText = '0 قطعة';
                cartTotal.innerText = '0.00 ر.س';
                return;
            }

            cartItemsContainer.innerHTML = '';
            let total = 0;
            let totalQty = 0;

            cart.forEach(item => {
                let itemTotal = item.price * item.qty;
                total += itemTotal;
                totalQty += item.qty;

                cartItemsContainer.innerHTML += `
                    <div class="flex justify-between items-center bg-gray-50 p-2.5 rounded-xl text-xs border border-gray-100">
                        <div class="ml-2">
                            <p class="font-bold text-gray-800">${item.name}</p>
                            <p class="text-gray-400 mt-0.5">${item.price.toFixed(2)} ر.س × ${item.qty}</p>
                        </div>
                        <span class="font-bold text-gray-700 whitespace-nowrap">${itemTotal.toFixed(2)} ر.س</span>
                    </div>
                `;
            });

            cartCount.innerText = totalQty;
            piecesCount.innerText = `${totalQty} قطعة`;
            cartTotal.innerText = total.toFixed(2) + ' ر.س';
        }

        function checkout() {
            if (cart.length === 0) {
                alert("السلة فارغة حالياً! قم بإضافة المنتجات أولاً.");
                return;
            }
            let orderDetails = cart.map(item => `- ${item.name} (العدد: ${item.qty})`).join('\n');
            let totalStr = document.getElementById('cart-total').innerText;
            
            alert(`🎉 تم تأكيد طلبك بنجاح!\n\nقائمة المشتريات:\n${orderDetails}\n\nالحساب الإجمالي: ${totalStr}`);
            clearCart();
        }

        displayProducts(products);
    </script>
</body>
</html>
